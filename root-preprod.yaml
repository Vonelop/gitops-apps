apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-github
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Vonelop/gitops-apps.git
    targetRevision: dev
    path: apps/preprod
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
